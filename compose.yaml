services:
  pawvy:
    build:
      context: .
      args:
        - PAWVY_API_KEY=${PAWVY_API_KEY}
        - API_BASE=${API_BASE}
        - WS_BASE=${WS_BASE}
    container_name: pawvy
    restart: always
    ports:
      - "${PAWVY_PORT:-3001}:3001"
    env_file:
      - .env
    environment:
      # Fixed container path for database (volume maps host data dir to /app/data)
      - PAWVY_DB_PATH=/app/data/pawvy.db
      # Keep runtime paths container-local even when .env uses host paths for mounts
      - PAWVY_PROJECTS_DIR=/app/workspace-projects
      - OPENCLAW_HOME=/app/openclaw
    volumes:
      # User-provided host paths from .env (PAWVY_DATA_DIR, PAWVY_PROJECTS_DIR, OPENCLAW_HOME)
      # These map host directories to fixed container paths
      - ${PAWVY_DATA_DIR:-./data}:/app/data
      - ${PAWVY_PROJECTS_DIR:-${HOME}/.pawvy/projects}:/app/workspace-projects:ro
      - ${OPENCLAW_HOME:-${HOME}/.openclaw}:/app/openclaw:ro
